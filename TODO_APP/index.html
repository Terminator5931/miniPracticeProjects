<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <dialog>
      <form>
        <label for="title"
          >Title: <input type="text" name="title" class="title" />
        </label>
        <label for="description"
          >Description:
          <textarea cols="5" class="description"></textarea>
        </label>
        <label for="priority"
          >Title:
          <select class="priority">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
        </label>
        <button type="submit">Submit</button>
      </form>
    </dialog>
    <div id="leftSection"></div>
    <div id="rightSection">
      <h1>Checklist</h1>
      <button>Add New</button>
      <div>
        <p>
          <span style="width: 20%; display: inline-block">Title</span
          >Description
        </p>
      </div>
      <div id="content"></div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
